<svg width="980" height="660" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="980" height="660" fill="white"/>

  <!-- ===== TITLE ===== -->
  <text x="490" y="38" text-anchor="middle" font-family="Times New Roman, serif"
        font-size="17" font-weight="bold" fill="#1a1a1a">ScholarGenie — System Architecture</text>

  <!-- ===== TIER SIDE LABELS ===== -->
  <text x="82" y="108" text-anchor="middle" font-family="Times New Roman, serif"
        font-size="11" fill="#666" transform="rotate(-90,82,108)">PRESENTATION</text>
  <text x="82" y="315" text-anchor="middle" font-family="Times New Roman, serif"
        font-size="11" fill="#666" transform="rotate(-90,82,315)">APPLICATION</text>
  <text x="82" y="520" text-anchor="middle" font-family="Times New Roman, serif"
        font-size="11" fill="#666" transform="rotate(-90,82,520)">DATA</text>

  <!-- ===== TIER 1: PRESENTATION ===== -->
  <rect x="110" y="62" width="470" height="92" rx="10"
        fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <text x="345" y="100" text-anchor="middle" font-family="Times New Roman, serif"
        font-size="15" font-weight="bold" fill="#1E3A8A">Presentation Tier</text>
  <text x="345" y="126" text-anchor="middle" font-family="Times New Roman, serif"
        font-size="13" fill="#1E40AF">Next.js 14 Frontend (Port 3000)</text>

  <!-- Arrow Tier 1 → Tier 2 -->
  <line x1="345" y1="154" x2="345" y2="218" stroke="#374151" stroke-width="2"/>
  <polygon points="338,215 352,215 345,229" fill="#374151"/>
  <rect x="353" y="172" width="116" height="20" rx="3" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1"/>
  <text x="411" y="186" text-anchor="middle" font-family="Times New Roman, serif"
        font-size="11" fill="#374151">HTTP REST Requests</text>

  <!-- ===== TIER 2: APPLICATION (taller to hold sub-boxes) ===== -->
  <rect x="110" y="230" width="470" height="170" rx="10"
        fill="#D1FAE5" stroke="#059669" stroke-width="2"/>
  <text x="345" y="258" text-anchor="middle" font-family="Times New Roman, serif"
        font-size="15" font-weight="bold" fill="#065F46">Application Tier</text>

  <!-- Sub-box 1: FastAPI Backend -->
  <rect x="125" y="268" width="200" height="70" rx="7"
        fill="#A7F3D0" stroke="#047857" stroke-width="1.5"/>
  <text x="225" y="295" text-anchor="middle" font-family="Times New Roman, serif"
        font-size="13" font-weight="bold" fill="#065F46">FastAPI Backend</text>
  <text x="225" y="315" text-anchor="middle" font-family="Times New Roman, serif"
        font-size="12" fill="#047857">Port 8000</text>

  <!-- Sub-box 2: Semantic Search Engine -->
  <rect x="355" y="268" width="210" height="70" rx="7"
        fill="#FDE68A" stroke="#B45309" stroke-width="1.5"/>
  <text x="460" y="292" text-anchor="middle" font-family="Times New Roman, serif"
        font-size="13" font-weight="bold" fill="#92400E">Semantic Search Engine</text>
  <text x="460" y="310" text-anchor="middle" font-family="Times New Roman, serif"
        font-size="11" fill="#B45309">Sentence-BERT</text>
  <text x="460" y="326" text-anchor="middle" font-family="Times New Roman, serif"
        font-size="10" fill="#B45309">(all-MiniLM-L6-v2)</text>

  <!-- Internal arrow between sub-boxes -->
  <line x1="325" y1="303" x2="353" y2="303" stroke="#065F46" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="349,297 357,303 349,309" fill="#065F46"/>

  <!-- Base Paper note -->
  <text x="460" y="360" text-anchor="middle" font-family="Times New Roman, serif"
        font-size="10" fill="#92400E" font-style="italic">★ Base Paper Contribution</text>

  <!-- Arrow Tier 2 → Tier 3 -->
  <line x1="345" y1="400" x2="345" y2="458" stroke="#374151" stroke-width="2"/>
  <polygon points="338,455 352,455 345,469" fill="#374151"/>
  <rect x="353" y="415" width="90" height="20" rx="3" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1"/>
  <text x="398" y="429" text-anchor="middle" font-family="Times New Roman, serif"
        font-size="11" fill="#374151">SQL Queries</text>

  <!-- ===== TIER 3: DATA ===== -->
  <rect x="110" y="470" width="470" height="92" rx="10"
        fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
  <text x="345" y="508" text-anchor="middle" font-family="Times New Roman, serif"
        font-size="15" font-weight="bold" fill="#92400E">Data Tier</text>
  <text x="345" y="534" text-anchor="middle" font-family="Times New Roman, serif"
        font-size="13" fill="#B45309">SQLite Database</text>

  <!-- ===== EXTERNAL SERVICES LABEL ===== -->
  <text x="790" y="218" text-anchor="middle" font-family="Times New Roman, serif"
        font-size="12" font-weight="bold" fill="#6D28D9">External Services</text>

  <!-- arXiv API box -->
  <rect x="690" y="228" width="190" height="55" rx="8"
        fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="785" y="252" text-anchor="middle" font-family="Times New Roman, serif"
        font-size="13" font-weight="bold" fill="#4C1D95">arXiv API</text>
  <text x="785" y="272" text-anchor="middle" font-family="Times New Roman, serif"
        font-size="11" fill="#5B21B6">Paper Discovery</text>

  <!-- Semantic Scholar API box -->
  <rect x="690" y="295" width="190" height="55" rx="8"
        fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="785" y="318" text-anchor="middle" font-family="Times New Roman, serif"
        font-size="12" font-weight="bold" fill="#4C1D95">Semantic Scholar API</text>
  <text x="785" y="338" text-anchor="middle" font-family="Times New Roman, serif"
        font-size="11" fill="#5B21B6">Citations &amp; Metadata</text>

  <!-- Groq Inference API box -->
  <rect x="690" y="362" width="190" height="55" rx="8"
        fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="785" y="385" text-anchor="middle" font-family="Times New Roman, serif"
        font-size="13" font-weight="bold" fill="#4C1D95">Groq Inference API</text>
  <text x="785" y="405" text-anchor="middle" font-family="Times New Roman, serif"
        font-size="11" fill="#5B21B6">LLM Summarization</text>

  <!-- Arrows from Application Tier to External APIs -->
  <line x1="580" y1="290" x2="688" y2="256" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="683,250 692,254 685,262" fill="#7C3AED"/>

  <line x1="580" y1="310" x2="688" y2="322" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="683,317 693,321 686,329" fill="#7C3AED"/>

  <line x1="580" y1="340" x2="688" y2="378" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="682,374 692,377 686,385" fill="#7C3AED"/>

  <!-- ===== CAPTION ===== -->
  <text x="490" y="596" text-anchor="middle" font-family="Times New Roman, serif"
        font-size="13" fill="#1a1a1a">Figure 3.1 System Architecture of ScholarGenie</text>
</svg>
